name: Trigger Weekly Ops Report

on:
  # 每周一北京 03:33(UTC 周日 19:33) — 避开整点
  # 私有 repo 的 schedule 不稳,所以挂在公开 repo 上调度
  schedule:
    - cron: "33 19 * * 0"
  workflow_dispatch:
    inputs:
      start_date:
        description: "起始日期 YYYY-MM-DD(含)— 留空默认上周一"
        required: false
        default: ""
      end_date:
        description: "结束日期 YYYY-MM-DD(含)— 留空默认上周日"
        required: false
        default: ""

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger carycheung/weekly-ops-bot weekly-report.yml
        env:
          TRIGGER_PAT: ${{ secrets.TRIGGER_PAT }}
          START_DATE: ${{ github.event.inputs.start_date }}
          END_DATE: ${{ github.event.inputs.end_date }}
        run: |
          PAYLOAD=$(jq -n \
            --arg ref "main" \
            --arg start "$START_DATE" \
            --arg end "$END_DATE" \
            '{ref: $ref, inputs: {start_date: $start, end_date: $end}}')

          echo "Triggering with payload: $PAYLOAD"

          HTTP_CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $TRIGGER_PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/carycheung/weekly-ops-bot/actions/workflows/weekly-report.yml/dispatches" \
            -d "$PAYLOAD")

          echo "HTTP $HTTP_CODE"
          cat /tmp/resp.txt
          echo ""

          if [ "$HTTP_CODE" != "204" ]; then
            echo "❌ Trigger failed"
            exit 1
          fi
          echo "✅ Trigger succeeded"
